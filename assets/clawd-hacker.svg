<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -0.5 20 15" width="2000" height="1500" shape-rendering="crispEdges">
  <!-- claw tips poking out of sleeves -->
  <rect x="0" y="8.5" width="1" height="2" fill="#d97757"/>
  <rect x="19" y="8.5" width="1" height="2" fill="#d97757"/>
  <!-- sleeves -->
  <rect x="1" y="8.5" width="2" height="2" fill="#333a45"/>
  <rect x="17" y="8.5" width="2" height="2" fill="#333a45"/>
  <!-- legs -->
  <rect x="4" y="12" width="1" height="2" fill="#d97757"/>
  <rect x="6" y="12" width="1" height="2" fill="#d97757"/>
  <rect x="13" y="12" width="1" height="2" fill="#d97757"/>
  <rect x="15" y="12" width="1" height="2" fill="#d97757"/>
  <!-- torso -->
  <rect x="3" y="8" width="14" height="4" fill="#333a45"/>
  <!-- kangaroo pocket, pixel-stepped top corners -->
  <path fill="#232830" d="M7 12v-1.5h.5v-.5h.5v-.5h4v.5h.5v.5h.5V12Z"/>
  <!-- face -->
  <rect x="5" y="3" width="10" height="5" fill="#d97757"/>
  <rect x="5" y="3" width="10" height="1" fill="#b85f43"/>
  <!-- eyes -->
  <rect x="7" y="4.5" width="1" height="2" fill="#12151a"/>
  <rect x="12" y="4.5" width="1" height="2" fill="#12151a"/>
  <!-- hood, up -->
  <rect x="9" y="0" width="2" height="1" fill="#333a45"/>
  <rect x="6" y="1" width="8" height="1" fill="#333a45"/>
  <rect x="5" y="2" width="10" height="1" fill="#333a45"/>
  <rect x="4" y="3" width="1" height="5" fill="#333a45"/>
  <rect x="15" y="3" width="1" height="5" fill="#333a45"/>
  <!-- hood highlights -->
  <rect x="9" y="0" width="1" height="0.5" fill="#454d5a"/>
  <rect x="6" y="1" width="1.5" height="0.5" fill="#454d5a"/>
  <!-- drawstrings -->
  <rect x="5.75" y="8" width="0.5" height="1.5" fill="#cfd3da"/>
  <rect x="5.75" y="9.5" width="0.5" height="0.4" fill="#9aa1ab"/>
  <rect x="13.75" y="8" width="0.5" height="1.5" fill="#cfd3da"/>
  <rect x="13.75" y="9.5" width="0.5" height="0.4" fill="#9aa1ab"/>
</svg>
